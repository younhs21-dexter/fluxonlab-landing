<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLUXON — A New Generation of Automation</title>
  <meta name="description" content="FLUXON - Test Automation Platform. A new generation of automation for EMC testing.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05060a;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Animated grid background */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* Radial glow */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      pointer-events: none;
    }

    .glow-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.3), transparent 70%);
      top: 30%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse1 8s ease-in-out infinite;
    }

    .glow-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.25), transparent 70%);
      top: 60%; left: 30%;
      transform: translate(-50%, -50%);
      animation: pulse2 10s ease-in-out infinite;
    }

    .glow-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.2), transparent 70%);
      top: 40%; left: 70%;
      transform: translate(-50%, -50%);
      animation: pulse3 12s ease-in-out infinite;
    }

    @keyframes pulse1 {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.15); }
    }
    @keyframes pulse2 {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); }
    }
    @keyframes pulse3 {
      0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: rgba(56, 189, 248, 0.6);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Scan line */
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.15), transparent);
      animation: scanDown 6s linear infinite;
      pointer-events: none;
    }

    @keyframes scanDown {
      0% { top: -2px; }
      100% { top: 100vh; }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    /* Logo */
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5em;
      color: rgba(56, 189, 248, 0.7);
      text-transform: uppercase;
      margin-bottom: 3rem;
      position: relative;
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.5), transparent);
    }

    /* Main headline */
    .headline {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #f0f0f0 0%, #38bdf8 50%, #a855f7 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 8s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Subtitle */
    .subtitle {
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 4rem;
    }

    /* Divider */
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.3), rgba(168, 85, 247, 0.3), transparent);
      margin-bottom: 3rem;
    }

    /* Status badge */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border: 1px solid rgba(56, 189, 248, 0.15);
      border-radius: 100px;
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.1em;
      backdrop-filter: blur(10px);
      background: rgba(56, 189, 248, 0.03);
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 6px; height: 6px;
      background: #38bdf8;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Contact */
    .contact {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .contact a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.2);
      text-decoration: none;
      letter-spacing: 0.15em;
      transition: color 0.3s ease;
    }

    .contact a:hover {
      color: rgba(56, 189, 248, 0.6);
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      width: 30px; height: 30px;
      border-color: rgba(56, 189, 248, 0.1);
      border-style: solid;
      z-index: 5;
    }
    .corner-tl { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }

    /* Responsive */
    @media (max-width: 768px) {
      .logo { font-size: 0.85rem; margin-bottom: 2rem; }
      .subtitle { font-size: 0.85rem; letter-spacing: 0.2em; }
    }
  </style>
</head>
<body>
  <!-- Background effects -->
  <div class="grid-bg"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>
  <div class="glow-orb glow-3"></div>
  <div class="scanline"></div>
  <div class="particles" id="particles"></div>

  <!-- Corner decorations -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Main content -->
  <div class="content">
    <div class="logo">FLUXON</div>
    <h1 class="headline">A New Generation<br>of Automation</h1>
    <p class="subtitle">Test Automation Platform</p>
    <div class="divider"></div>
    <div class="status">
      <span class="status-dot"></span>
      IN DEVELOPMENT
    </div>
  </div>

  <!-- Contact -->
  <div class="contact">
    <a href="mailto:younhs21@gmail.com">younhs21@gmail.com</a>
  </div>

  <!-- Particle generator -->
  <script>
    const container = document.getElementById('particles');
    const count = 40;

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (Math.random() * 15 + 10) + 's';
      p.style.animationDelay = (Math.random() * 15) + 's';
      p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
      p.style.opacity = Math.random() * 0.5 + 0.2;
      container.appendChild(p);
    }
  </script>
</body>
</html>
